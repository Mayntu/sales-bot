gym:
  name: Underground Gym Astana
  network_status: Крупнейшая сеть фитнес-клубов в Астане
hall_types:
  gym:
    label: GYM
    description: Стандартные залы. Тренажёрный зал, кардио, свободные веса.
  big:
    label: BIG
    description: Большие залы. Всё из GYM + финская сауна на некоторых адресах.
  big_plus:
    label: BIG+
    description: 'Очень большие залы. Всё из BIG + групповые занятия (йога, стретчинг,
      фитнес-микс). ВАЖНО: на групповые нужна предварительная запись. Групповые ТОЛЬКО
      в BIG+.

      '
