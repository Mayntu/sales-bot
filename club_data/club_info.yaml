trainers:
  duty:
    name: Дежурный тренер
    included_in: Все абонементы (включён в цену)
    description: 'Всегда в зале. Подойдёт, подскажет технику, покажет упражнение.
      Не персональное ведение, но надёжная поддержка.

      '
    sell_tip: Идеально для тех кто хочет поддержку но не готов к персональному.
  personal:
    name: Персональный тренер
    included_in: Только в оффере 11+1 (первый месяц)
    pricing: Оплачивается отдельно, у каждого тренера свой прайс
    description: 'Весь фокус на тебе. Тренер рядом всю тренировку: техника, программа,
      мотивация, корректировка под твои цели.

      '
payment:
  installment:
    available: true
    partners: Kaspi.kz, Halyk Bank, Jusan
    terms: 0-0-12 (без переплаты на 12 месяцев)
    note: При некоторых способах оплаты возможна комиссия до 10%
  two_installments:
    available: true
    description: 'Оплата в 2 транша: 50% сразу, 50% через месяц'
    warning: Если второй транш не оплачен — абонемент замораживается автоматически
freeze:
  max_days: 30
  description: Заморозка до 30 дней — при болезни или отъезде
hooks:
- Первая пробная тренировка — платно, 5 000 тг
- InBody чекап тела включён в Золотую карту (% жира, воды, мышечной массы)
- 'Единый билет: одна карта — доступ ко всем залам города'
- Заморозка до 30 дней — абонемент не горит
- Рассрочка 0-0-12 через Kaspi, Halyk, Jusan
- Оплата в 2 транша если нужно
